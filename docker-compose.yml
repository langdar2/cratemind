services:
  cratemind:
    image: ghcr.io/langdar2/cratemind:latest
    # To build locally: comment out 'image' and uncomment 'build':
    # build: .
    container_name: cratemind
    # Optional: Run as specific user for NAS/Synology (use your PUID:PGID)
    # user: "1000:1000"
    ports:
      - "5765:5765"
    volumes:
      # Mount your Gerbera database (read-only)
      - /path/to/gerbera.db:/gerbera/gerbera.db:ro
      # Mount your playlist output directory (must be watched by Gerbera)
      - /path/to/playlists:/music/playlists
      # Persist app data (library cache, settings, result history)
      - ./data:/app/data
    restart: unless-stopped
